services:

  backend:
    build:
      context: ../../FutureTech-Backend
    image: futuretech-backend
    ports:
      - "5000:5000"
    env_file:
      - ../../FutureTech-Backend/.env
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/shared/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  frontend:
    build:
      context: ../../FutureTech-Frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
    image: futuretech-frontend
    ports:
      - "3000:3000"
    environment:
      INTERNAL_API_URL: ${INTERNAL_API_URL}
      JWT_VERIFY_SECRET: ${JWT_VERIFY_SECRET}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge